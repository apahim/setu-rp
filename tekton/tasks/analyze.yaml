apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: setu-rp-analyze
spec:
  params:
    - name: db-path
      type: string
  workspaces:
    - name: data
  steps:
    - name: analyze
      image: setu-rp:latest
      env:
        - name: DB_PATH
          value: $(params.db-path)
      script: |
        #!/usr/bin/env bash
        set -euo pipefail
        bash scripts/analyze.sh
